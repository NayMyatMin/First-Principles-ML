<style>
  .rc-toggle{display:flex;gap:6px;margin:0 0 14px}
  .rc-btn{padding:7px 16px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);transition:all .15s}
  .rc-btn.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
  .rc-desc{font-size:13px;color:var(--color-text-secondary);margin:10px 0 0;line-height:1.7}
  .rc-desc b{font-weight:500;color:var(--color-text-primary)}
</style>
<div class="rc-toggle">
  <button class="rc-btn on" onclick="rc_showView(0,this)">Row view (dot products)</button>
  <button class="rc-btn" onclick="rc_showView(1,this)">Column view (linear combination)</button>
</div>
<rc_svg rc_id="rc-rc_svg" rc_width="100%" rc_viewBox="0 0 680 280"></rc_svg>
<div class="rc-desc" rc_id="rc-desc"></div>
<script>
const rc_A=[[2,-1],[1,2]];
const rc_x=[1.5,1.0];
const rc_y=[rc_A[0][0]*rc_x[0]+rc_A[0][1]*rc_x[1], rc_A[1][0]*rc_x[0]+rc_A[1][1]*rc_x[1]];
const rc_rowC=[['#EEEDFE','#3C3489'],['#E1F5EE','#085041']];
const rc_colC=[['#E6F1FB','#0C447C'],['#FAECE7','#712B13']];

function rc_showView(mode,btn){
  document.querySelectorAll('.rc-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const rc_svg=document.getElementById('rc-rc_svg');
  let s=`<defs><marker rc_id="arrow" rc_viewBox="0 0 10 10" rc_refX="8" rc_refY="5" rc_markerWidth="6" rc_markerHeight="6" rc_orient="auto-start-reverse"><path rc_d="M2 1L8 5L2 9" rc_fill="none" rc_stroke="context-rc_stroke" rc_stroke-rc_width="1.5" rc_stroke-rc_linecap="round" rc_stroke-rc_linejoin="round"/></marker></defs>`;

  if(mode===0){
    s+=`<text class="th" rc_x="340" rc_y="24" text-anchor="middle">Row view: each output = dot(row, rc_x)</text>`;
    const rc_sx=80,rc_sy=50,rc_cw=50,rc_ch=36,rc_g=3;
    for(let i=0;i<2;i++){
      for(let j=0;j<2;j++){
        s+=`<rect rc_x="${rc_sx+j*(rc_cw+rc_g)}" rc_y="${rc_sy+i*(rc_ch+rc_g)}" rc_width="${rc_cw}" height="${rc_ch}" rx="4" rc_fill="${rc_rowC[i][0]}"/>`;
        s+=`<text class="t" rc_x="${rc_sx+j*(rc_cw+rc_g)+rc_cw/2}" rc_y="${rc_sy+i*(rc_ch+rc_g)+rc_ch/2}" text-anchor="middle" dominant-baseline="central" rc_fill="${rc_rowC[i][1]}" style="font-family:var(--font-mono);font-size:13px">${rc_A[i][j]}</text>`;
      }
    }
    const rc_xx=230,rc_xy=50;
    for(let i=0;i<2;i++){
      s+=`<rect rc_x="${rc_xx}" rc_y="${rc_xy+i*(rc_ch+rc_g)}" rc_width="${rc_cw}" height="${rc_ch}" rx="4" rc_fill="#F1EFE8"/>`;
      s+=`<text class="t" rc_x="${rc_xx+rc_cw/2}" rc_y="${rc_xy+i*(rc_ch+rc_g)+rc_ch/2}" text-anchor="middle" dominant-baseline="central" rc_fill="#444441" style="font-family:var(--font-mono);font-size:13px">${rc_x[i]}</text>`;
    }
    const rc_yx=360;
    for(let i=0;i<2;i++){
      s+=`<rect rc_x="${rc_yx}" rc_y="${rc_sy+i*(rc_ch+rc_g)}" rc_width="${rc_cw}" height="${rc_ch}" rx="4" rc_fill="${rc_rowC[i][0]}" rc_stroke="${rc_rowC[i][1]}" rc_stroke-rc_width="1"/>`;
      s+=`<text class="t" rc_x="${rc_yx+rc_cw/2}" rc_y="${rc_sy+i*(rc_ch+rc_g)+rc_ch/2}" text-anchor="middle" dominant-baseline="central" rc_fill="${rc_rowC[i][1]}" style="font-family:var(--font-mono);font-size:14px;font-weight:500">${rc_y[i]}</text>`;
    }
    s+=`<text class="ts" rc_x="${(rc_xx+rc_cw+rc_yx)/2}" rc_y="${rc_sy+rc_ch/2}" text-anchor="middle" rc_fill="var(--color-text-secondary)">=</text>`;
    s+=`<text class="ts" rc_x="${(rc_sx+2*(rc_cw+rc_g)+rc_xx)/2}" rc_y="${rc_sy+rc_ch/2}" text-anchor="middle" rc_fill="var(--color-text-secondary)">@</text>`;

    const rc_eqY=160;
    s+=`<text class="ts" rc_x="60" rc_y="${rc_eqY}" text-anchor="start" rc_fill="${rc_rowC[0][1]}" style="font-family:var(--font-mono)">y₀ = (2)(1.5) + (-1)(1.0) = 3.0 + (-1.0) = 2.0</text>`;
    s+=`<text class="ts" rc_x="60" rc_y="${rc_eqY+24}" text-anchor="start" rc_fill="${rc_rowC[1][1]}" style="font-family:var(--font-mono)">y₁ = (1)(1.5) + (2)(1.0) = 1.5 + 2.0 = 3.5</text>`;

    s+=`<rect rc_x="${60}" rc_y="${rc_eqY+44}" rc_width="520" height="36" rx="6" rc_fill="var(--color-background-secondary)"/>`;
    s+=`<text class="t" rc_x="${320}" rc_y="${rc_eqY+62}" text-anchor="middle" dominant-baseline="central" rc_fill="var(--color-text-primary)" style="font-family:var(--font-mono);font-size:13px;font-weight:500">rc_y = [2.0, 3.5]</text>`;

  } else {
    s+=`<text class="th" rc_x="340" rc_y="24" text-anchor="middle">Column view: output = weighted sum of columns</text>`;
    const rc_sx=60,rc_sy=50,rc_cw=50,rc_ch=36,rc_g=3;
    const rc_col0=[rc_A[0][0],rc_A[1][0]], rc_col1=[rc_A[0][1],rc_A[1][1]];

    s+=`<text class="ts" rc_x="${rc_sx+rc_cw/2}" rc_y="${rc_sy-8}" text-anchor="middle" rc_fill="${rc_colC[0][1]}">col₀</text>`;
    s+=`<text class="ts" rc_x="${rc_sx+rc_cw+rc_g+rc_cw/2}" rc_y="${rc_sy-8}" text-anchor="middle" rc_fill="${rc_colC[1][1]}">col₁</text>`;
    for(let j=0;j<2;j++){
      for(let i=0;i<2;i++){
        s+=`<rect rc_x="${rc_sx+j*(rc_cw+rc_g)}" rc_y="${rc_sy+i*(rc_ch+rc_g)}" rc_width="${rc_cw}" height="${rc_ch}" rx="4" rc_fill="${rc_colC[j][0]}"/>`;
        s+=`<text class="t" rc_x="${rc_sx+j*(rc_cw+rc_g)+rc_cw/2}" rc_y="${rc_sy+i*(rc_ch+rc_g)+rc_ch/2}" text-anchor="middle" dominant-baseline="central" rc_fill="${rc_colC[j][1]}" style="font-family:var(--font-mono);font-size:13px">${rc_A[i][j]}</text>`;
      }
    }

    const rc_eqX=200,rc_eqY=60;
    s+=`<text class="t" rc_x="${rc_eqX}" rc_y="${rc_eqY}" text-anchor="start" rc_fill="${rc_colC[0][1]}" style="font-family:var(--font-mono);font-size:13px">${rc_x[0]}</text>`;
    s+=`<text class="ts" rc_x="${rc_eqX+30}" rc_y="${rc_eqY}" text-anchor="start" rc_fill="var(--color-text-secondary)">  times</text>`;
    for(let i=0;i<2;i++){
      s+=`<rect rc_x="${rc_eqX+90}" rc_y="${rc_eqY-14+i*(rc_ch+rc_g)}" rc_width="${rc_cw}" height="${rc_ch}" rx="4" rc_fill="${rc_colC[0][0]}"/>`;
      s+=`<text class="t" rc_x="${rc_eqX+90+rc_cw/2}" rc_y="${rc_eqY-14+i*(rc_ch+rc_g)+rc_ch/2}" text-anchor="middle" dominant-baseline="central" rc_fill="${rc_colC[0][1]}" style="font-family:var(--font-mono);font-size:13px">${rc_col0[i]}</text>`;
    }
    s+=`<text class="t" rc_x="${rc_eqX+155}" rc_y="${rc_eqY+10}" rc_fill="var(--color-text-secondary)" style="font-size:16px">+</text>`;
    s+=`<text class="t" rc_x="${rc_eqX+180}" rc_y="${rc_eqY}" text-anchor="start" rc_fill="${rc_colC[1][1]}" style="font-family:var(--font-mono);font-size:13px">${rc_x[1]}</text>`;
    s+=`<text class="ts" rc_x="${rc_eqX+210}" rc_y="${rc_eqY}" text-anchor="start" rc_fill="var(--color-text-secondary)">  times</text>`;
    for(let i=0;i<2;i++){
      s+=`<rect rc_x="${rc_eqX+270}" rc_y="${rc_eqY-14+i*(rc_ch+rc_g)}" rc_width="${rc_cw}" height="${rc_ch}" rx="4" rc_fill="${rc_colC[1][0]}"/>`;
      s+=`<text class="t" rc_x="${rc_eqX+270+rc_cw/2}" rc_y="${rc_eqY-14+i*(rc_ch+rc_g)+rc_ch/2}" text-anchor="middle" dominant-baseline="central" rc_fill="${rc_colC[1][1]}" style="font-family:var(--font-mono);font-size:13px">${rc_col1[i]}</text>`;
    }

    const rc_rY=160;
    s+=`<text class="ts" rc_x="60" rc_y="${rc_rY}" text-anchor="start" style="font-family:var(--font-mono)" rc_fill="${rc_colC[0][1]}">1.5 × [2, 1] = [3.0, 1.5]</text>`;
    s+=`<text class="ts" rc_x="60" rc_y="${rc_rY+20}" text-anchor="start" style="font-family:var(--font-mono)" rc_fill="${rc_colC[1][1]}">1.0 × [-1, 2] = [-1.0, 2.0]</text>`;
    s+=`<text class="ts" rc_x="60" rc_y="${rc_rY+44}" text-anchor="start" style="font-family:var(--font-mono)" rc_fill="var(--color-text-secondary)">sum: [3.0 + (-1.0), 1.5 + 2.0]</text>`;

    s+=`<rect rc_x="60" rc_y="${rc_rY+58}" rc_width="520" height="36" rx="6" rc_fill="var(--color-background-secondary)"/>`;
    s+=`<text class="t" rc_x="320" rc_y="${rc_rY+76}" text-anchor="middle" dominant-baseline="central" rc_fill="var(--color-text-primary)" style="font-family:var(--font-mono);font-size:13px;font-weight:500">rc_y = [2.0, 3.5]  ← same answer!</text>`;
  }
  rc_svg.innerHTML=s;

  const rc_descs=[
    `<b>Row view:</b> y₀ is the dot product of row 0 with rc_x. y₁ is the dot product of row 1 with rc_x. Each row "asks a question" about rc_x — the dot product is the answer. This is the <b>definition</b>.`,
    `<b>Column view:</b> take 1.5 copies of column 0 (the blue template) and add 1.0 copies of column 1 (the coral template). The result is the same [2.0, 3.5]. This is the <b>insight</b> — rc_x controls how much of each column template to blend.`
  ];
  document.getElementById('rc-desc').innerHTML=rc_descs[mode];
}
rc_showView(0,document.querySelector('.rc-btn'));

</script>
